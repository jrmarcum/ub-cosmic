---
name: Build live ISO (titanoboa)

# Builds a live, bootable ISO of the ub-cosmic image using ublue-os/titanoboa.
# This consumes the image that build.yml already pushed to GHCR, so make sure
# "Build container image" has succeeded at least once first.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to build the ISO from"
        required: true
        default: "latest"
  # Optional: also build an ISO on a schedule (weekly).
  # schedule:
  #   - cron: '30 12 * * 1'

env:
  IMAGE_NAME: ${{ github.event.repository.name }}          # = ub-cosmic
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}" # do not edit

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-iso:
    name: Build live ISO
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
    steps:
      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@cc0becac701cf642c8f0a6613bbdaf5dc36b259e # v9
        with:
          remove-codeql: true

      - name: Lowercase the image reference
        run: |
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> "${GITHUB_ENV}"
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "${GITHUB_ENV}"

      - name: Build ISO
        id: build
        uses: ublue-os/titanoboa@main
        with:
          image-ref: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.tag }}

      - name: Rename and checksum ISO
        run: |
          mkdir -p output
          mv "${{ steps.build.outputs.iso-dest }}" "output/${IMAGE_NAME}-${{ inputs.tag }}.iso"
          cd output
          sha256sum "${IMAGE_NAME}-${{ inputs.tag }}.iso" \
            | tee "${IMAGE_NAME}-${{ inputs.tag }}.iso-CHECKSUM"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.IMAGE_NAME }}-iso
          path: output/
          if-no-files-found: error
          retention-days: 7
          compression-level: 0
          overwrite: true
