# Used only for LOCAL BIB-based ISO builds (`just build-iso`).
# The published live ISO is built in CI by titanoboa (.github/workflows/build-iso.yml),
# which does NOT use this file.
#
# The kickstart below rebases the freshly installed system onto your GHCR image.
# Update the image ref if you change your GitHub owner or image name.
[customizations.installer.kickstart]
contents = """
%post
bootc switch --mutate-in-place --transport registry ghcr.io/jrmarcum/ub-cosmic:latest
%end
"""

[customizations.installer.modules]
enable = [
  "org.fedoraproject.Anaconda.Modules.Storage",
  "org.fedoraproject.Anaconda.Modules.Runtime"
]
disable = [
  "org.fedoraproject.Anaconda.Modules.Network",
  "org.fedoraproject.Anaconda.Modules.Security",
  "org.fedoraproject.Anaconda.Modules.Services",
  "org.fedoraproject.Anaconda.Modules.Subscription",
  "org.fedoraproject.Anaconda.Modules.Timezone"
]
