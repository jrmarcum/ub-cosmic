# Titanoboa / Container-native ISO contract (v0.1.0)
# https://github.com/ondrejbudai/bootc-isos
#
# This file is baked into the image (via system_files/) and tells titanoboa how
# to label the live ISO and what GRUB boot entries to create. The CDLABEL in the
# kernel args MUST match `label` below.
label: ub-cosmic
grub2:
  default: 0
  timeout: 10
  entries:
    - name: "ub-cosmic (COSMIC) Live"
      linux: "/images/pxeboot/vmlinuz quiet rhgb root=live:CDLABEL=ub-cosmic enforcing=0 rd.live.image"
      initrd: "/images/pxeboot/initrd.img"
    - name: "ub-cosmic (COSMIC) Live — Basic Graphics"
      linux: "/images/pxeboot/vmlinuz quiet rhgb root=live:CDLABEL=ub-cosmic enforcing=0 rd.live.image nomodeset"
      initrd: "/images/pxeboot/initrd.img"
